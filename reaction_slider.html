<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Slider (Non-linear)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --panel: #161b26;
    --border: #2a3040;
    --amber: #f5a623;
    --amber-dim: #c47d0e;
    --amber-glow: rgba(245,166,35,0.12);
    --text: #e8e8e8;
    --text-dim: #8a95a8;
    --text-muted: #4a5568;
    --red: #e05c5c;
    --green: #5ce09a;
    --blue: #5cb8e0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  /* HIGH CONTRAST THEME */
  body.hc {
    --bg: #ffffff;
    --panel: #ffffff;
    --border: #000000;
    --amber: #000000;
    --amber-dim: #000000;
    --amber-glow: rgba(0,0,0,0.0);
    --text: #000000;
    --text-dim: #000000;
    --text-muted: #000000;
    --red: #000000;
    --green: #000000;
    --blue: #000000;
  }
  body.hc #xi-slider { background: #999; }
  body.hc #xi-slider::-webkit-slider-thumb { background: #000; border-color: #fff; box-shadow: 0 0 0 1px #000; }
  body.hc #xi-slider::-moz-range-thumb { background: #000; border-color: #fff; }
  body.hc .row-I td:not(.row-label-cell) { background: #ffffff; color: #000; }
  body.hc .row-C td:not(.row-label-cell) { background: #ffffff; }
  body.hc .row-C .pos { color: #000; }
  body.hc .row-C .neg { color: #000; }
  body.hc .row-C .zero { color: #000; }
  body.hc .row-E td:not(.row-label-cell) { background: #ffffff; color: #000; }
  body.hc #q-value { color: #000; }
  body.hc .unit-btn.active { background: #000; color: #fff; border-color: #000; }
  body.hc #title-block { background: #ffffff; }
  body.hc .row-label-cell { background: #ffffff !important; color: #000 !important; }
  body.hc #ice-table th.row-header { background: #ffffff; color: #000; }
  body.hc #ice-table th { background: #ffffff; color: #000; border-bottom-color: #000; }
  body.hc .pure-cell { color: #000 !important; }
  body.hc .conc-pure { color: #000; }
  body.hc #conc-unit-tag { color: #000 !important; }
  body.hc #top-bar { background: #ffffff; }
  body.hc .top-section { border-right-color: #000; }
  body.hc #top-bar { border-bottom-color: #000; }
  body.hc #xi-block { border-bottom-color: #000; }
  body.hc #ice-wrapper { border-bottom-color: #000; }
  body.hc #q-formula { color: #000; }
  body.hc #q-formula span { color: #000 !important; }

  /* Toggle button */
  #contrast-toggle {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 0.9rem;
    cursor: pointer;
    padding: 4px 8px;
    transition: all 0.2s;
    align-self: flex-start;
  }
  #contrast-toggle:hover { border-color: var(--amber); color: var(--amber); }
  body.hc #contrast-toggle { content: '☾'; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* PAGE: top controls bar + bottom interactive area */
  body {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* ═══════════════════════════════════
     TOP CONTROLS BAR
  ═══════════════════════════════════ */
  #top-bar {
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: stretch;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .top-section {
    padding: 13px 20px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 7px;
    flex-shrink: 0;
  }
  .top-section:last-child { border-right: none; flex: 1; }

  .section-label {
    font-family: var(--mono);
    font-size: 0.57rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .section-label2 {
    font-family: var(--mono);
    font-size: 0.57rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    white-space: nowrap;
  }


  /* Title */
  #title-block {
    min-width: 150px;
    background: linear-gradient(135deg, rgba(245,166,35,0.08) 0%, transparent 100%);
  }
  #title-block h1 {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
  }
  #title-block p { font-size: 0.67rem; color: var(--text-dim); font-weight: 300; }

  /* Equation section */
  #eq-block { min-width: 300px; }
  #eq-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.83rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  #eq-input:focus { border-color: var(--amber-dim); }
  #eq-input::placeholder { color: var(--text-muted); }
  #eq-display {
    min-height: 32px;
    display: flex;
    align-items: center;
    font-size: 1rem;
    color: var(--text);
    overflow-x: auto;
    padding: 2px 0;
  }
  #eq-display .ph { color: var(--text-muted); font-size: 0.7rem; font-family: var(--mono); font-style: italic; }

  /* Units */
  #unit-block { min-width: 90px; }
  #unit-selector { display: flex; gap: 6px; }
  .unit-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    white-space: nowrap;
  }
  .unit-btn.active { background: var(--amber-glow); border-color: var(--amber); color: var(--amber); }
  .unit-btn:hover:not(.active) { border-color: var(--text-muted); color: var(--text); }

  /* Concentrations — flex row of stacked cards */
  #conc-block { min-width: 180px; }
  #conc-inputs {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-start;
  }

  .conc-card {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 100px;
    max-width: 140px;
  }
  .conc-species-label {
    font-size: 0.8rem;
    font-family: var(--mono);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .conc-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .conc-input:focus { border-color: var(--amber-dim); }
  .conc-input.invalid { border-color: var(--red); }
  .conc-pure {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    font-style: italic;
    text-align: center;
    letter-spacing: 0.05em;
  }
  .conc-empty-msg {
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    font-style: italic;
  }

  /* ═══════════════════════════════════
     BOTTOM: slider + table + Q
  ═══════════════════════════════════ */
  #bottom-area {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 0;
    padding: 14px 28px 12px;
    gap: 0;
  }

  /* SLIDER */
  #xi-block {
    flex-shrink: 0;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  #xi-top-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
  }
  #xi-label {
    font-family: var(--mono);
    font-size: 0.57rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  #xi-value-display {
    font-family: var(--mono);
    font-size: 0.98rem;
    color: var(--amber);
    font-weight: 500;
  }
  #xi-bounds {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  #xi-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #xi-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--amber);
    border: 3px solid #0f1117;
    box-shadow: 0 0 0 1px var(--amber-dim), 0 2px 8px rgba(245,166,35,0.3);
    cursor: grab;
    transition: transform 0.1s;
  }
  #xi-slider::-webkit-slider-thumb:active { transform: scale(1.15); cursor: grabbing; }
  #xi-slider::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--amber); border: 3px solid #0f1117; cursor: grab;
  }

  /* ICE TABLE */
  #ice-wrapper {
    overflow: auto;
    min-height: 0;
    border-bottom: 1px solid var(--border);
  }
  #placeholder-msg {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    text-align: center;
  }
  #placeholder-msg .icon { font-size: 2.5rem; opacity: 0.25; }
  #placeholder-msg p { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em; line-height: 1.7; }

  #ice-table { border-collapse: collapse; width: 100%; }
  #ice-table th, #ice-table td {
    padding: 13px 20px;
    text-align: center;
    font-family: var(--mono);
    font-size: 1.1rem;
    border: 1px solid var(--border);
  }
  #ice-table th {
    background: rgba(245,166,35,0.06);
    color: var(--amber);
    font-size: 0.88rem;
    font-weight: 600;
    border-bottom: 2px solid var(--amber-dim);
    white-space: nowrap;
  }
  #ice-table th.row-header {
    color: var(--text-muted);
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(8,10,16,0.7);
    border-bottom: 2px solid var(--border);
    width: 76px;
  }
  .row-label-cell {
    color: var(--text-muted) !important;
    font-size: 0.6rem !important;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(8,10,16,0.7) !important;
    border-right: 2px solid var(--border) !important;
  }
  .row-I td:not(.row-label-cell) { background: rgba(92,184,224,0.05); color: var(--blue); }
  .row-C td:not(.row-label-cell) { background: rgba(245,166,35,0.04); }
  .row-C .pos { color: #7ac76a; }
  .row-C .neg { color: #e07a7a; }
  .row-C .zero { color: var(--text-muted); }
  .row-E td:not(.row-label-cell) { background: rgba(92,224,154,0.07); color: var(--green); }
  .pure-cell { color: var(--text-muted) !important; font-style: italic; font-size: 0.8rem !important; letter-spacing: 0.05em; }

  /* Q */
  #q-block {
    display: flex;
    align-items: center;
    gap: 24px;
    padding-top: 9px;
    flex-shrink: 0;
  }
  #q-label {
    font-family: var(--mono);
    font-size: 0.57rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  #q-value {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  #q-formula {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- ═══ TOP CONTROLS BAR ═══ -->
<div id="top-bar">

  <div class="top-section" id="title-block">
    <h1>Reaction Slider</h1>
    <p>log-linear mapping</p>
    <button id="contrast-toggle" title="Toggle high contrast">☀</button>
  </div>

  <div class="top-section" id="eq-block">
    <div class="section-label">Chemical Equation</div>
    <input id="eq-input" type="text" placeholder="e.g.  2H2(g) + O2(g) &lt;=&gt; 2H2O(g)" autocomplete="off" spellcheck="false">
    <div id="eq-display"><span class="ph">rendered equation appears here</span></div>
  </div>

  <div class="top-section" id="unit-block">
    <div class="section-label">Units</div>
    <div id="unit-selector">
      <div class="unit-btn active" data-unit="M">M</div>
      <div class="unit-btn" data-unit="mM">mM</div>
    </div>
  </div>

  <div class="top-section" id="conc-block">
    <div class="section-label2">
      INITIAL CONCENTRATIONS
      <span id="conc-unit-tag" style="color:var(--amber);margin-left:6px">(M)</span>
    </div>
    <div id="conc-inputs">
      <span class="conc-empty-msg">parse an equation first</span>
    </div>
  </div>

</div>

<!-- ═══ BOTTOM: SLIDER + TABLE + Q ═══ -->
<div id="bottom-area">

  <div id="xi-block">
    <div id="xi-top-row">
      <span id="xi-label">Extent of Reaction ξ</span>
      <span id="xi-value-display">—</span>
    </div>
    <div id="xi-bounds">
      <span id="xi-min-label">—</span>
      <span id="xi-max-label">—</span>
    </div>
    <input id="xi-slider" type="range" min="0" max="100" value="0" step="0.01">
  </div>

  <div id="ice-wrapper">
    <div id="placeholder-msg">
      <div class="icon">⚗</div>
      <p>Enter a valid equation above<br>to generate the ICE table.</p>
    </div>
  </div>

  <div id="q-block">
    <div>
      <div id="q-label">Reaction Quotient Q</div>
      <div id="q-value">—</div>
    </div>
    <div id="q-formula"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const state = {
  species: [],
  initConc: {},
  unit: 'M',
  xiMin: 0,
  xiMax: 0,
  xi: 0,
};

// ══════════════════════════════════════
// FORMATTING
// ══════════════════════════════════════
function fmt(val) {
  const abs = Math.abs(val);
  if (abs === 0) return '0.000';
  if (abs >= 1000 || abs < 0.010) return val.toExponential(2);
  return val.toFixed(3);
}
function fmtXi(val) {
  if (!isFinite(val)) return '—';
  const abs = Math.abs(val);
  if (abs === 0) return '0.0000';
  if (abs >= 1000 || (abs < 0.010 && abs > 0)) return val.toExponential(2);
  return val.toFixed(4);
}

// Accepts plain decimal OR scientific notation (e.g. 1.5e-4)
function parseConc(str) {
  if (!str || str.trim() === '') return 0;
  const v = Number(str.trim());
  return isNaN(v) ? null : v;
}

// ══════════════════════════════════════
// EQUATION PARSER
// ══════════════════════════════════════
function parseEquation(raw) {
  let s = raw.replace(/^\\ce\{/, '').replace(/\}$/, '').trim();
  s = s.replace(/\s+/g, ' ');  // normalize whitespace so " + " separators are preserved
  let sides;
  if (s.includes('<=>'))      sides = s.split('<=>');
  else if (s.includes('->')) sides = s.split('->');
  else return null;
  if (sides.length !== 2) return null;

  const species = [];
  if (!parseSide(sides[0].trim(), -1, species)) return null;
  if (!parseSide(sides[1].trim(), +1, species)) return null;
  return species.length > 0 ? species : null;
}

function parseSide(str, sign, out) {
  for (const tok of splitSpecies(str)) {
    if (!tok) continue;
    const sp = parseSpeciesToken(tok, sign);
    if (!sp) return false;
    out.push(sp);
  }
  return true;
}

function splitSpecies(side) {
  // Use " + " (with spaces) as separator so "+" in charges like Ag+(aq) is not split
  return side.split(' + ').map(s => s.trim()).filter(s => s.length > 0);
}

function parseSpeciesToken(tok, sign) {
  const m = tok.match(/^(\d+\.?\d*)?(.+)$/);
  if (!m) return null;
  const coeff    = m[1] ? parseFloat(m[1]) : 1;
  const nameRaw  = m[2];
  const stateM   = nameRaw.match(/(\((?:aq|g|s|l)\))$/i);
  const stateStr = stateM ? stateM[1].toLowerCase() : '';
  const isPure   = stateStr === '(s)' || stateStr === '(l)';
  return { name: nameRaw, coeff, sign, stateStr, isPure };
}

// ══════════════════════════════════════
// MATHJAX HELPERS
// ══════════════════════════════════════
let mjxTimer = null;
function typeset(el) {
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]);
}

// ══════════════════════════════════════
// EQUATION INPUT
// ══════════════════════════════════════
document.getElementById('eq-input').addEventListener('input', function () {
  clearTimeout(mjxTimer);
  mjxTimer = setTimeout(() => {
    // Render display
    const raw = this.value.trim().replace(/^\\ce\{/, '').replace(/\}$/, '').trim();
    const display = document.getElementById('eq-display');
    if (raw) {
      display.innerHTML = `\\(\\ce{${raw}}\\)`;
      typeset(display);
    } else {
      display.innerHTML = '<span class="ph">rendered equation appears here</span>';
    }

    const parsed = parseEquation(this.value);
    if (parsed) {
      const newConc = {};
      parsed.forEach(sp => {
        newConc[sp.name] = state.initConc[sp.name] !== undefined ? state.initConc[sp.name] : 0;
      });
      state.species  = parsed;
      state.initConc = newConc;
      buildConcInputs();
      rebuildAndUpdate();
    } else {
      state.species = [];
      buildConcInputs();
      clearTable();
    }
  }, 280);
});

// ══════════════════════════════════════
// UNIT SELECTOR
// ══════════════════════════════════════
document.querySelectorAll('.unit-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.unit = btn.dataset.unit;
    document.getElementById('conc-unit-tag').textContent = `(${state.unit})`;
    rebuildAndUpdate();
  });
});

// ══════════════════════════════════════
// CONCENTRATION INPUTS
// ══════════════════════════════════════
function buildConcInputs() {
  const container = document.getElementById('conc-inputs');
  container.innerHTML = '';

  if (!state.species || state.species.length === 0) {
    container.innerHTML = '<span class="conc-empty-msg">parse an equation first</span>';
    return;
  }

  state.species.forEach(sp => {
    const card = document.createElement('div');
    card.className = 'conc-card';

    const lbl = document.createElement('div');
    lbl.className = 'conc-species-label';
    lbl.innerHTML = `\\(\\ce{${sp.name}}\\)`;

    card.appendChild(lbl);

    if (sp.isPure) {
      const pd = document.createElement('div');
      pd.className = 'conc-pure';
      pd.textContent = 'pure';
      card.appendChild(pd);
    } else {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'conc-input';
      inp.placeholder = '0  or  1.5e-3';
      const existing = state.initConc[sp.name];
      inp.value = (existing !== undefined && existing !== 0) ? String(existing) : '';

      inp.addEventListener('input', () => {
        const v = parseConc(inp.value);
        if (v === null) { inp.classList.add('invalid'); }
        else            { inp.classList.remove('invalid'); state.initConc[sp.name] = v; rebuildAndUpdate(); }
      });
      inp.addEventListener('blur', () => {
        if (parseConc(inp.value) === null) {
          inp.value = '';
          inp.classList.remove('invalid');
          state.initConc[sp.name] = 0;
          rebuildAndUpdate();
        }
      });
      card.appendChild(inp);
    }

    container.appendChild(card);
    setTimeout(() => typeset(lbl), 40);
  });
}

// ══════════════════════════════════════
// XI BOUNDS
// ══════════════════════════════════════
function calcXiBounds() {
  let xiMin = -Infinity, xiMax = Infinity;
  state.species.forEach(sp => {
    if (sp.isPure) return;
    const I  = state.initConc[sp.name] || 0;
    const sc = sp.sign * sp.coeff;
    if      (sc > 0) xiMin = Math.max(xiMin, -I / sc);
    else if (sc < 0) xiMax = Math.min(xiMax, -I / sc);
  });
  if (!isFinite(xiMin)) xiMin = 0;
  if (!isFinite(xiMax)) xiMax = 0;
  if (xiMin > xiMax) { xiMin = 0; xiMax = 0; }
  return { xiMin, xiMax };
}

// ══════════════════════════════════════
// LOG-LINEAR HYBRID MAPPING (spec §3)
// ══════════════════════════════════════

// Forward: slider position P (0–100) → factor f (0–1)
function sliderToF(P) {
  const Pnorm = P / 100;
  if (Pnorm <= 0.0001) return 0;
  if (Pnorm < 0.1)     return Math.pow(10, -10 + (Pnorm / 0.1) * 8);
  if (Pnorm <= 0.9)    return 0.01 + ((Pnorm - 0.1) / 0.8) * 0.98;
  if (Pnorm < 0.9999)  return 1 - Math.pow(10, -2 - ((Pnorm - 0.9) / 0.1) * 8);
  return 1;
}

// Forward: slider position P (0–100) → ξ
function sliderToXi(P, min, max) {
  return min + sliderToF(P) * (max - min);
}

// Inverse: factor f (0–1) → slider position P (0–100)
function fToSlider(f) {
  if (f <= 0) return 0;
  if (f >= 1) return 100;
  if (f < 0.01) {
    // Lower Buffer: f = 10^(-10 + (Pnorm/0.1)*8)
    // Pnorm = 0.1 * (log10(f) + 10) / 8
    return 0.1 * (Math.log10(f) + 10) / 8 * 100;
  }
  if (f <= 0.99) {
    // Linear Core: f = 0.01 + ((Pnorm - 0.1) / 0.8) * 0.98
    // Pnorm = 0.1 + (f - 0.01) / 0.98 * 0.8
    return (0.1 + (f - 0.01) / 0.98 * 0.8) * 100;
  }
  // Upper Buffer: f = 1 - 10^(-2 - ((Pnorm-0.9)/0.1)*8)
  // Pnorm = 0.9 + 0.1 * (-2 - log10(1-f)) / 8
  return Math.min(100, (0.9 + 0.1 * (-2 - Math.log10(1 - f)) / 8) * 100);
}

// ══════════════════════════════════════
// SLIDER EVENT
// ══════════════════════════════════════
document.getElementById('xi-slider').addEventListener('input', function () {
  state.xi = sliderToXi(parseFloat(this.value), state.xiMin, state.xiMax);
  updateDisplays();
});

// ══════════════════════════════════════
// REBUILD & UPDATE
// ══════════════════════════════════════
function rebuildAndUpdate() {
  if (!state.species || state.species.length === 0) return;
  const { xiMin, xiMax } = calcXiBounds();
  state.xiMin = xiMin;
  state.xiMax = xiMax;

  // Position slider at xi = 0 using the inverse mapping
  let pct = 0;
  if (xiMax !== xiMin) {
    const f0 = Math.max(0, Math.min(1, (0 - xiMin) / (xiMax - xiMin)));
    pct = Math.max(0, Math.min(100, fToSlider(f0)));
  }
  state.xi = 0;
  document.getElementById('xi-slider').value = pct;

  buildICETable();
  updateDisplays();
}

function updateDisplays() {
  const xi = state.xi;
  document.getElementById('xi-value-display').textContent = `ξ = ${fmtXi(xi)} ${state.unit}`;
  document.getElementById('xi-min-label').textContent     = `min: ${fmtXi(state.xiMin)}`;
  document.getElementById('xi-max-label').textContent     = `max: ${fmtXi(state.xiMax)}`;
  updateICERows(xi);
  updateQ(xi);
}

// ══════════════════════════════════════
// ICE TABLE BUILD
// ══════════════════════════════════════
function buildICETable() {
  const wrapper = document.getElementById('ice-wrapper');
  wrapper.innerHTML = '';

  const table = document.createElement('table');
  table.id = 'ice-table';

  // Header
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  const corner = document.createElement('th');
  corner.className = 'row-header';
  hr.appendChild(corner);
  state.species.forEach(sp => {
    const th = document.createElement('th');
    th.innerHTML = `\\(\\ce{${sp.name}}\\)`;
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);

  // Rows
  const tbody = document.createElement('tbody');
  [['I','Initial'],['C','Change'],['E','Current']].forEach(([key, label]) => {
    const tr = document.createElement('tr');
    tr.className = `row-${key}`;
    const lbl = document.createElement('td');
    lbl.className = 'row-label-cell';
    lbl.textContent = label;
    tr.appendChild(lbl);
    state.species.forEach(sp => {
      const td = document.createElement('td');
      td.dataset.row  = key;
      td.dataset.name = sp.name;
      if (sp.isPure) td.className = 'pure-cell';
      td.textContent = '—';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrapper.appendChild(table);
  setTimeout(() => typeset(table), 0);
}

function getCell(row, name) {
  return document.querySelector(`[data-row="${row}"][data-name="${CSS.escape(name)}"]`);
}

function updateICERows(xi) {
  if (!state.species || state.species.length === 0) return;
  state.species.forEach(sp => {
    const cI = getCell('I', sp.name);
    const cC = getCell('C', sp.name);
    const cE = getCell('E', sp.name);
    if (!cI) return;

    if (sp.isPure) {
      cI.textContent = 'pure'; cC.textContent = '—'; cE.textContent = 'pure';
      return;
    }

    const I      = state.initConc[sp.name] || 0;
    const change = sp.sign * sp.coeff * xi;
    const E      = Math.max(0, I + change);

    cI.textContent = fmt(I);
    cE.textContent = fmt(E);

    if (Math.abs(change) < 1e-12) {
      cC.textContent = '0.00'; cC.className = 'zero';
    } else if (change > 0) {
      cC.textContent = `+${fmt(Math.abs(change))}`; cC.className = 'pos';
    } else {
      cC.textContent = `−${fmt(Math.abs(change))}`; cC.className = 'neg';
    }
  });
}

// ══════════════════════════════════════
// Q CALCULATION
// ══════════════════════════════════════
function updateQ(xi) {
  const qVal     = document.getElementById('q-value');
  const qFormula = document.getElementById('q-formula');
  if (!state.species || state.species.length === 0) { qVal.textContent = '—'; qFormula.textContent = ''; return; }

  const scale = state.unit === 'mM' ? 1e-3 : 1;

  // Split into solution-phase (included in Q) and pure (excluded — contribute factor 1)
  const solnReactants = state.species.filter(s => s.sign === -1 && !s.isPure);
  const solnProducts  = state.species.filter(s => s.sign === +1 && !s.isPure);
  const pureReactants = state.species.filter(s => s.sign === -1 &&  s.isPure);
  const pureProducts  = state.species.filter(s => s.sign === +1 &&  s.isPure);

  // Need at least one reactant side and one product side (pure or solution)
  const hasReactants = solnReactants.length > 0 || pureReactants.length > 0;
  const hasProducts  = solnProducts.length  > 0 || pureProducts.length  > 0;
  if (!hasReactants) { qVal.textContent = '—'; qFormula.textContent = 'No reactants found'; return; }
  if (!hasProducts)  { qVal.textContent = '—'; qFormula.textContent = 'No products found';  return; }

  // If both sides are entirely pure, Q = 1 always
  if (solnReactants.length === 0 && solnProducts.length === 0) {
    qVal.textContent = '1.000';
    qFormula.textContent = 'All species pure — Q = 1 by convention';
    return;
  }

  let num = 1, den = 1;
  const nP = [], dP = [];
  let divZero = false;

  // Numerator: solution-phase products (pure products omitted = factor 1)
  if (solnProducts.length === 0) {
    nP.push('1');  // all products pure
  } else {
    solnProducts.forEach(sp => {
      const E = Math.max(0, (state.initConc[sp.name] || 0) + sp.sign * sp.coeff * xi);
      num *= Math.pow(E * scale, sp.coeff);
      nP.push(sp.coeff === 1 ? `[${sp.name}]` : `[${sp.name}]^${sp.coeff}`);
    });
  }

  // Denominator: solution-phase reactants (pure reactants omitted = factor 1)
  if (solnReactants.length === 0) {
    dP.push('1');  // all reactants pure
  } else {
    solnReactants.forEach(sp => {
      const E = Math.max(0, (state.initConc[sp.name] || 0) + sp.sign * sp.coeff * xi);
      const c = E * scale;
      if (c < 1e-15) divZero = true;
      den *= Math.pow(c, sp.coeff);
      dP.push(sp.coeff === 1 ? `[${sp.name}]` : `[${sp.name}]^${sp.coeff}`);
    });
  }

  if (divZero) {
    qVal.textContent     = '≈ ∞';
    qFormula.textContent = 'Reactant → 0, Q diverges';
    return;
  }

  qVal.textContent = fmt(num / den);
  qFormula.innerHTML =
    `<span style="color:var(--text-dim)">Q =</span> ` +
    `<span style="color:var(--green)">${nP.join(' · ')}</span>` +
    `<span style="color:var(--text-muted)"> / </span>` +
    `<span style="color:var(--red)">${dP.join(' · ')}</span>`;
}

// ══════════════════════════════════════
// HIGH CONTRAST TOGGLE
// ══════════════════════════════════════
document.getElementById('contrast-toggle').addEventListener('click', function () {
  const hc = document.body.classList.toggle('hc');
  this.textContent = hc ? '☾' : '☀';
  this.title = hc ? 'Switch to dark theme' : 'Switch to high contrast';
});

// ══════════════════════════════════════
// CLEAR
// ══════════════════════════════════════
function clearTable() {
  document.getElementById('ice-wrapper').innerHTML = `
    <div id="placeholder-msg">
      <div class="icon">⚗</div>
      <p>Enter a valid equation above<br>to generate the ICE table.</p>
    </div>`;
  document.getElementById('q-value').textContent      = '—';
  document.getElementById('q-formula').textContent    = '';
  document.getElementById('xi-value-display').textContent = '—';
  document.getElementById('xi-min-label').textContent = '—';
  document.getElementById('xi-max-label').textContent = '—';
}
</script>
